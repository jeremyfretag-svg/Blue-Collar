name: Invalidate CDN Cache

on:
  workflow_run:
    workflows: ["Deploy to Production"]
    types: [completed]
  workflow_dispatch:
    inputs:
      paths:
        description: 'Paths to invalidate (comma-separated, default: /*)'
        required: false
        default: '/*'

jobs:
  invalidate:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Invalidate CloudFront cache
        run: |
          PATHS="${{ github.event.inputs.paths || '/*' }}"
          echo "Invalidating paths: $PATHS"
          
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths $PATHS
          
          echo "Invalidation request submitted successfully"

      - name: Wait for invalidation to complete
        run: |
          DISTRIBUTION_ID=${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          
          # Get the latest invalidation ID
          INVALIDATION_ID=$(aws cloudfront list-invalidations \
            --distribution-id $DISTRIBUTION_ID \
            --query 'InvalidationList.Items[0].Id' \
            --output text)
          
          echo "Waiting for invalidation $INVALIDATION_ID to complete..."
          
          # Poll for completion (max 10 minutes)
          for i in {1..60}; do
            STATUS=$(aws cloudfront get-invalidation \
              --distribution-id $DISTRIBUTION_ID \
              --id $INVALIDATION_ID \
              --query 'Invalidation.Status' \
              --output text)
            
            if [ "$STATUS" = "Completed" ]; then
              echo "Invalidation completed successfully"
              exit 0
            fi
            
            echo "Status: $STATUS (attempt $i/60)"
            sleep 10
          done
          
          echo "Invalidation still in progress, but workflow completed"
