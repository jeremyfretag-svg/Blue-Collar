name: Enhanced CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PNPM_VERSION: 9
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Parallel Test Execution ────────────────────────────────────────────────
  api-test:
    name: API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Run tests (parallel)
        run: pnpm vitest run --reporter=verbose
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: test-secret

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./packages/api/coverage/coverage-final.json
          flags: api

  api-lint:
    name: API Type-check & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Type-check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm eslint src --max-warnings 0

  app-build:
    name: App Build
    runs-on: ubuntu-latest
    needs: [api-test]
    defaults:
      run:
        working-directory: packages/app
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Restore Next.js cache
        uses: actions/cache@v5
        with:
          path: packages/app/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('packages/app/pnpm-lock.yaml', 'pnpm-lock.yaml') }}-${{ hashFiles('packages/app/src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: app-build
          path: packages/app/.next
          retention-days: 1

  app-lint:
    name: App Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/app
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Lint
        run: pnpm next lint

  contracts-test:
    name: Contracts Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/contracts/target
          key: cargo-${{ runner.os }}-${{ hashFiles('packages/contracts/Cargo.toml', 'packages/contracts/contracts/**/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Run contract tests
        run: cargo test --all
        working-directory: packages/contracts

  contracts-build:
    name: Contracts WASM Build
    runs-on: ubuntu-latest
    needs: [contracts-test]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/contracts/target
          key: cargo-${{ runner.os }}-${{ hashFiles('packages/contracts/Cargo.toml', 'packages/contracts/contracts/**/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install stellar-cli
        run: cargo install --locked stellar-cli --features opt

      - name: Build WASM contracts
        run: stellar contract build
        working-directory: packages/contracts

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v3
        with:
          name: wasm-contracts
          path: packages/contracts/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 1

  # ── Build Docker Images ────────────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [api-test, app-build, contracts-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push API image
        uses: docker/build-push-action@v4
        with:
          context: ./packages/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}-api
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deployment Preview (for PRs) ────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview Environment
    runs-on: ubuntu-latest
    needs: [app-build, api-test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Download app build
        uses: actions/download-artifact@v3
        with:
          name: app-build
          path: packages/app/.next

      - name: Deploy to preview
        run: |
          echo "Deploying PR #${{ github.event.pull_request.number }} to preview environment"
          echo "Preview URL: https://preview-${{ github.event.pull_request.number }}.bluecollar.io"

      - name: Comment on PR
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Preview deployed at https://preview-${{ github.event.pull_request.number }}.bluecollar.io'
            })

  # ── Automated Rollback on Failure ────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [api-test, app-build, contracts-build, build-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # Add your deployment script here

      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          # Add smoke test script

      - name: Notify deployment
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              auto_merge: false,
              required_contexts: []
            })

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed! Initiating rollback..."
          # Add rollback script here

  # ── Deployment Notifications ────────────────────────────────────────────────
  notify-deployment:
    name: Send Deployment Notifications
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "BlueCollar Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*BlueCollar Production Deployment*\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
