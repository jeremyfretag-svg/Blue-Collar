apiVersion: apps/v1
kind: Deployment
metadata:
  name: bluecollar-api
  namespace: bluecollar
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: bluecollar-api
  template:
    metadata:
      labels:
        app: bluecollar-api
    spec:
      containers:
      - name: api
        image: bluecollar/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: bluecollar-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: bluecollar-secrets
              key: jwt-secret
        - name: PORT
          value: "3000"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: bluecollar-api
  namespace: bluecollar
spec:
  type: ClusterIP
  selector:
    app: bluecollar-api
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
